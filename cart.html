 <div class="cart">
<h2>Your Cart</h2>

<div id="cart-items"></div>

 <h3 id="total"></h3>
  <form class="orderForm" id="orderForm" onsubmit="placeOrder(event)">
    <h3 class="title"> Additional info </h3>
 <input type="text" id="fullName" placeholder="Full Name" required><br><br>
 <input type="text" id="adress" placeholder="Adress" required><br><br>
 <input type="tel" placeholder="phone number" required><br><br>




  </form>
  <button type="button" class="checkout"  onclick="sendToWhatsApp()">Order Via WhatsApp</button>
</div>
<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cart-items");
let remove = removeItem; 
let total = 0;
 function showMessage(text){
    const msg = document.getElementById("message");
    msg.innerText = text;
    msg.style.display = "block";
       setTimeout(()=>{
      msg.style.display = "none";
     },2000);
}
function displayCart(){
    container.innerHTML="";
    total=0;

    cart.forEach((item,index)=>{
        total += item.price * item.quantity;

        container.innerHTML += `
<div class="divv">
    <img src="${item.image}" width="80">
    <p class="pj">${item.name}</p>
    <p class="pk">${item.price} MAD</p>
    <p class="pl">Quantity: ${item.quantity}</p>
    <button class="remove" onclick="removeItem(${index})">Remove</button>
    <hr>
</div>
`;
        
    });

    document.getElementById("total").innerText="Total: "+total+" MAD";
}

function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}
cart.forEach((item, index)=>{
    cart.innerHTML = `
    <span>${item.name}</span> 
    <span>${item.price}</span> 
    <button id="remove-btn" onclick="removeItem(${index})"> remove </button>`; 
         
}    )

function sendToWhatsApp(){

if(cart.length === 0){
    showMessage("your cart is empty!");
    return;
}

let fullName = document.getElementById("fullName").value;
let adress = document.getElementById("adress").value;

if(fullName === "" || adress === ""){
    showMessage("PLEASE FILL ALL FIELDS!");
    return;
}

let message = "Salam, bghit ndwez commande:%0A%0A";

cart.forEach(item=>{
    message += `• ${item.name} x${item.quantity} - ${item.price * item.quantity} MAD%0A`;
});

message += `%0ATotal: ${total} MAD%0A`;
message += `%0A•Full Name: ${fullName}%0A`;
message += `%0A•Adress: ${adress}%0A`;

let whatsappURL = `https://wa.me/212635365685?text=${message}`;

window.open(whatsappURL, "_blank");
}

displayCart();
</script>
